# Built with Jekyll 4.4.1

# Setup

title: 'Unsettling Seas'
tagline: "Caribbean Women's and Feminist Creative Writing, 1989-2001"
description: "Bibliographic Resources for Caribbean Women's and Feminist Creative Writing, 1989-2001"
url: 'https://ccarvel.github.io'
baseurl: '/warren-jekyll-site'
incremental: true

# About/contact
author:
  name:              Warren Harding
  url:               
  email:             

# Permalinks

# Color scheme. Options: red, orange, magenta, cyan, blue, brown
color-scheme: 

permalink: /:title/

# Set encoding to UTF-8
encoding: utf-8

# Collections for texts
collections:
  writers:
    output: true
  texts:
    output: true
# Markdown specs
markdown: kramdown

kramdown:
  auto_ids:       true
  footnote_nr:    1
  entity_output:  as_char
  footnote_backlink: "&#x21a9;&#xfe0e;"
  toc_levels:     1..6
  smart_quotes:   lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Exclusions from the final site
exclude:
  - optional
  - vendor
  - Gemfile
  - Gemfile.lock
  - Rakefile
  - README.md
  - LICENSE.md
  - TODO.md
  - TRANSFER.md
  - AGENTS.md
  - CLAUDE.md
  - GEMINI.md
  - AI_CONTEXT.md
  - AI_WORK_LOG.md
  - ai_status.json
  - scripts/
  - "website proofing.docx"
  - zot-to-jekyll.rb
  - ed.gemspec
  - MAINTENANCE.md
  - APPS_AND_WORKFLOWS.md

# Theme
theme: "ed."

# Plugins
plugins:
  - jekyll/scholar

# Scholar
scholar:
  style: chicago-fullnote-bibliography
  locale: en

  sort_by: year
  order: descending

  group_by: none
  group_order: ascending

  source: ./_bibliography
  bibliography: references.bib
  bibliography_template: bibliography
  relative: "/warren-jekyll-site/bibliography.html"

  # bibtex_filters: markdown

  replace_strings: true
  join_strings:    true

# use_raw_bibtex_entry: true # Deprecated in jekyll-scholar
  allow_locale_overrides: true

  details_dir:    bibliography
  details_layout: bibtex.html
  details_link:   Details

  repository: archive

  query: "@*"


