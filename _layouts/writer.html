---
layout: default
---

<article class="page writer-page">
  <h1 class="page-title">{{ page.title }}</h1>

  {% if page.writer_id %}
  {% assign writer_text_path = "_texts/" | append: page.writer_id | append: "/" %}
  {% assign writer_texts = site.texts | sort: "title" %}
  {% endif %}

  <div class="writer-profile">
    {% include writer-infobox.html %}

    <div class="writer-body">
      {{ content }}
    </div>
  </div>
</article>
